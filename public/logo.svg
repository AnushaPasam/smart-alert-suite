<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium Gold Gradient for the borders -->
    <linearGradient id="gold_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="20%" stop-color="#F9E076" />
      <stop offset="50%" stop-color="#CF9928" />
      <stop offset="80%" stop-color="#F9E076" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <!-- Deep Navy Background Gradient -->
    <radialGradient id="navy_grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#002D58" />
      <stop offset="100%" stop-color="#001A33" />
    </radialGradient>

    <!-- Shadow filters for depth -->
    <filter id="outer_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="drop_shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Outer Gold Frame -->
  <circle cx="256" cy="256" r="240" fill="url(#gold_grad)" />
  <circle cx="256" cy="256" r="230" fill="#001A33" />
  <circle cx="256" cy="256" r="226" fill="url(#gold_grad)" />
  
  <!-- Main Navy Body -->
  <circle cx="256" cy="256" r="218" fill="url(#navy_grad)" />
  
  <!-- Thin inner gold line for detail -->
  <circle cx="256" cy="256" r="208" stroke="url(#gold_grad)" stroke-width="1" opacity="0.3" />

  <!-- Stars -->
  <g fill="#F9E076" filter="url(#drop_shadow)">
    <!-- Left Star -->
    <path d="M95 256 L102 248 L112 248 L106 256 L112 264 L102 264 Z" transform="translate(0,0)" />
    <!-- Precise star shape -->
    <path d="M100 256l6.18-4.49h7.64L107.64 256l6.18 4.49h-7.64z" display="none" />
    
    <!-- Re-drawing stars properly -->
    <path d="M105 256l5-15 5 15h15l-12 9 5 15-13-10-13 10 5-15-12-9h15z" transform="scale(0.4) translate(130, 490)" />
    <path d="M105 256l5-15 5 15h15l-12 9 5 15-13-10-13 10 5-15-12-9h15z" transform="scale(0.4) translate(910, 490)" />
  </g>

  <!-- Open Book -->
  <g filter="url(#drop_shadow)">
    <!-- Book Leaves (3D Effect with gradients) -->
    <path d="M256 320 Q256 320 340 330 Q400 350 400 420 Q320 390 256 390 Z" fill="white" />
    <path d="M256 320 Q256 320 172 330 Q112 350 112 420 Q192 390 256 390 Z" fill="#F0F4F8" />
    
    <!-- Inner shading for book -->
    <path d="M256 320 L256 390" stroke="#000" stroke-width="1" opacity="0.1" />
    
    <!-- Gold edge/underline for the book -->
    <path d="M112 420 Q192 390 256 390 Q320 390 400 420" stroke="url(#gold_grad)" stroke-width="3" fill="none" stroke-linecap="round" />
  </g>

  <!-- Alert Bell -->
  <g transform="translate(256, 185)" filter="url(#drop_shadow)">
    <!-- Main Bell Body -->
    <path d="M0 -65 C-40 -65 -45 -20 -45 10 C-45 30 -52 40 -52 45 L52 45 C52 40 45 30 45 10 C45 -20 40 -65 0 -65 Z" fill="white" />
    
    <!-- Bell Clapper -->
    <circle cy="50" r="10" fill="white" />
    
    <!-- Top Handle/Ring -->
    <path d="M-12 -65 A 12 12 0 0 1 12 -65" stroke="url(#gold_grad)" stroke-width="6" fill="none" stroke-linecap="round" />
    <circle cy="-75" r="8" fill="#F9E076" />
  </g>
</svg>
